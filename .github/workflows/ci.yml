name: CI

on:
  push:
    branches-ignore:
      - "gh-readonly-queue/**"
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

  # Loop 3 (red-rebase): on a failed PR gate, Claude pushes a fix to the PR branch.
  # Job-chained per SuxOS/.github#260/#263 — the old workflow_run stub structurally
  # never fired for PR branches, so this chain replaces a standalone claude-autofix.yml.
  autofix:
    needs: [check]
    if: needs.check.result == 'failure' && github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write # OIDC token-exchange for the Claude app
    uses: SuxOS/.github/.github/workflows/claude-autofix.yml@main
    with:
      pr-number: ${{ github.event.pull_request.number }}
      head-branch: ${{ github.event.pull_request.head.ref }}
      head-sha: ${{ github.event.pull_request.head.sha }}
      base-branch: ${{ github.event.pull_request.base.ref }}
      gates-summary: |
        npm run type-check · npm test
    secrets: inherit
