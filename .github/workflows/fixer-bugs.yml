name: Fixer (15m, bugs only)

# Tightest tier of the 3-cadence proposer (see fixer-30m.yml bugs+feats / fixer.yml deep).
# Scope: bugs — correctness bugs only, cheapest and most time-sensitive signal. Distinct
# workflow name -> distinct concurrency group.
# Reusable workflow: SuxOS/.github/.github/workflows/fixer.yml

on:
  # Fixer Cadence v2: bugs tier is change-triggered on merge, not a metronome.
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fixer:
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: SuxOS/.github/.github/workflows/fixer.yml@main
    with:
      max-turns: 10
      scope: bugs
    secrets: inherit
